plugins {
    id 'com.android.application'
}

android {
    namespace 'com.meridian.clearance'
    compileSdk 35

    defaultConfig {
        applicationId "com.meridian.clearance"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            // Installable directly; signed with the auto-generated debug key.
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            // NOTE: release builds are unsigned here. See README for signing.
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

// Kotlin stdlib hygiene.
// kotlin-stdlib (1.8+) absorbed the old kotlin-stdlib-jdk7 / kotlin-stdlib-jdk8
// artifacts. Some older AndroidX transitive deps still drag in the legacy ones
// (1.6.21), which collide at dex time ("Duplicate class ..."). Pin a single
// modern stdlib and drop the legacy split artifacts entirely — their classes
// already exist inside kotlin-stdlib, so nothing is lost.
configurations.all {
    resolutionStrategy {
        force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.24'
    }
    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.activity:activity:1.8.2'
    implementation 'androidx.webkit:webkit:1.11.0'
}
