<!-- GET LEAKED! — A Data Loss Prevention thriller -->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GET LEAKED! // Meridian Trust DLP Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=IBM+Plex+Mono:wght@400;500;600&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2e2410;
    --ink-soft:#766743;
    --line:#c7b386;
    --line-soft:#d6c69f;
    --surface:#f1e6c9;
    --surface-2:#e7d8b6;
    --bar:#2e2614;
    --bar-2:#221c0e;
    --amber:#d6921f;
    --ochre:#8f5e10;
    --green:#2c6b43;
    --green-br:#4f9a6e;
    --red:#a8341f;
    --red-br:#c9472f;
    --red-deep:#7a2615;
    --paper:#f8efd6;
    --paper-line:#d2c094;
    --paper-ink:#2a2210;
    --mut:#857851;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    --type:'Special Elite',monospace;
    --cond:'Oswald',sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(130% 100% at 50% -10%, #ecdcb6 0%, #ddc99e 58%, #ccb482 100%);
    color:var(--ink); font-family:var(--mono);
    -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  /* paper grain */
  body::after{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:60; opacity:.05;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    mix-blend-mode:multiply;
  }
  #app{height:100%; display:flex; flex-direction:column; max-width:1180px; margin:0 auto; position:relative; z-index:2}

  /* ===== Top console bar ===== */
  header{
    border-bottom:2px solid #4a3f23;
    background:linear-gradient(var(--bar),var(--bar-2));
    padding:11px 18px; display:flex; align-items:center; gap:18px;
    position:relative; overflow:hidden; flex:0 0 auto;
    box-shadow:0 4px 14px rgba(60,48,20,.22);
  }
  header::before{ /* faint scanlines */
    content:"";position:absolute;inset:0;pointer-events:none;opacity:.14;
    background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.5) 2px 3px);
  }
  .brand{font-family:var(--cond);font-weight:700;letter-spacing:.18em;font-size:18px;color:var(--amber);text-transform:uppercase;text-shadow:0 0 14px rgba(224,160,47,.4)}
  .brand small{display:block;font-size:9px;letter-spacing:.3em;color:#c2974a;font-weight:500}
  .stats{margin-left:auto;display:flex;gap:22px;align-items:center}
  .stat{font-family:var(--cond);text-align:right;line-height:1}
  .stat b{display:block;font-size:9px;letter-spacing:.22em;color:#a3966f;text-transform:uppercase;margin-bottom:3px}
  .stat span{font-size:18px;font-weight:600;letter-spacing:.04em;color:#efe7d2}
  .bal{color:#79c79a} .bal.neg{color:#e2705c}
  .strk{color:var(--amber)} .strk.bad{color:#e2705c}
  .daytag{color:#efe7d2}

  /* ===== Main work area ===== */
  main{flex:1 1 auto; display:grid; grid-template-columns:1.25fr .9fr; gap:0; min-height:0}
  .stage{position:relative; padding:22px 22px 18px; overflow:auto; border-right:1px solid var(--line)}
  .console{padding:20px 20px; display:flex; flex-direction:column; min-height:0; background:linear-gradient(var(--surface),var(--surface-2)); border-left:1px solid var(--line-soft)}

  /* queue strip */
  .queue{display:flex;align-items:center;gap:8px;font-family:var(--cond);font-size:11px;letter-spacing:.2em;color:var(--mut);text-transform:uppercase;margin-bottom:14px}
  .queue .pip{width:9px;height:9px;border:1px solid #b89a4e;border-radius:2px}
  .queue .pip.done{background:#c2a85e}
  .queue .pip.cur{background:var(--amber);box-shadow:0 0 8px var(--amber)}

  /* ===== The intercepted item: paper memo ===== */
  .item{
    background:
      linear-gradient(180deg, rgba(255,255,255,.4), transparent 60%),
      repeating-linear-gradient(0deg, transparent 0 27px, rgba(120,100,40,.05) 27px 28px),
      var(--paper);
    color:var(--paper-ink);
    border-radius:3px; padding:0; position:relative;
    box-shadow:0 16px 34px rgba(80,62,24,.28), 0 2px 0 rgba(120,100,50,.15);
    transform:rotate(-.25deg);
    border:1px solid var(--paper-line);
    animation:slidein .45s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes slidein{from{opacity:0;transform:translateY(26px) rotate(-1.5deg)}to{opacity:1;transform:rotate(-.25deg)}}
  .alertbar{
    background:repeating-linear-gradient(45deg,var(--red-deep) 0 12px,#9e3322 12px 24px);
    color:#ffe9df; font-family:var(--cond); font-weight:600; letter-spacing:.16em; text-transform:uppercase;
    font-size:11px; padding:7px 14px; display:flex; gap:10px; align-items:center; border-bottom:2px solid #5a1d11;
  }
  .alertbar .dot{width:8px;height:8px;border-radius:50%;background:#ff6a4d;box-shadow:0 0 9px #ff6a4d;animation:blink 1s steps(2) infinite}
  @keyframes blink{50%{opacity:.25}}
  .memo{padding:16px 20px 20px}
  .lh{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px dashed var(--paper-line);padding-bottom:10px;margin-bottom:12px}
  .lh .org{font-family:var(--cond);font-weight:700;letter-spacing:.08em;font-size:13px;color:#403a2e}
  .lh .org small{display:block;font-size:9px;letter-spacing:.25em;color:#8a7d5f;font-weight:500}
  .lh .ref{font-family:var(--mono);font-size:10px;color:#8a7d5f;text-align:right}
  table.fields{width:100%;border-collapse:collapse;font-size:13px;font-family:var(--mono)}
  table.fields td{padding:4px 0;vertical-align:top}
  table.fields td.k{width:118px;color:#998c6b;text-transform:uppercase;font-size:10px;letter-spacing:.12em;padding-top:6px}
  table.fields td.v{color:#231f17}
  .pill{display:inline-block;padding:1px 8px;border-radius:2px;font-size:11px;font-weight:600;letter-spacing:.04em}
  .c-Public{background:#cfe0c6;color:#34501f}
  .c-Internal{background:#cdd6e2;color:#2c3c57}
  .c-Confidential{background:#efd3a3;color:#7a4a07}
  .c-Restricted{background:#e9bcb0;color:#7a2418}
  .flag{background:#f1ddb0;border-bottom:1px solid #c79b3f}
  .hi{background:var(--amber);color:#1a1408;padding:0 3px;border-radius:1px;animation:hipop .3s}
  @keyframes hipop{from{background:#fff}to{background:var(--amber)}}
  .bodytxt{margin-top:12px;padding:11px 13px;background:rgba(120,100,40,.06);border-left:3px solid #cdbf9d;font-family:var(--type);font-size:13px;line-height:1.5;color:#332e22;white-space:pre-wrap}
  .attach{margin-top:10px;font-size:11px;color:#7d7257;font-family:var(--mono)}
  .attach b{color:#403a2e}
  .scanline-note{margin-top:12px;font-size:11px;color:#9a3b27;font-family:var(--cond);letter-spacing:.06em;display:none}
  .scanline-note.show{display:block}

  /* sticky note for special events */
  .sticky{
    position:absolute;right:-8px;top:46px;width:184px;background:#eccb50;color:#3a3210;
    font-family:var(--type);font-size:12px;line-height:1.4;padding:12px 13px;transform:rotate(2.5deg);
    box-shadow:0 10px 22px rgba(80,62,24,.32);border:1px solid #cdb340;
  }
  .sticky b{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;color:#7a5e05}

  /* stamp overlay */
  .stamp{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:5;
  }
  .stamp .mark{
    font-family:var(--cond);font-weight:700;font-size:46px;letter-spacing:.1em;text-transform:uppercase;
    border:5px solid;padding:8px 22px;border-radius:6px;opacity:0;transform:scale(2.4) rotate(-18deg);
  }
  .stamp.go .mark{animation:slam .5s cubic-bezier(.2,1.4,.4,1) forwards}
  @keyframes slam{0%{opacity:0;transform:scale(2.4) rotate(-18deg)}60%{opacity:1;transform:scale(.92) rotate(-12deg)}100%{opacity:.92;transform:scale(1) rotate(-11deg)}}
  .mark.release{color:#3f9a63;border-color:#3f9a63;text-shadow:0 1px 0 rgba(255,255,255,.4)}
  .mark.block{color:var(--red-br);border-color:var(--red-br);text-shadow:0 1px 0 rgba(255,255,255,.4)}

  /* ===== Console right side ===== */
  .panel-title{font-family:var(--cond);letter-spacing:.22em;text-transform:uppercase;font-size:11px;color:var(--mut);margin:0 0 10px;display:flex;align-items:center;gap:8px}
  .panel-title::before{content:"";width:6px;height:6px;background:var(--amber);box-shadow:0 0 7px var(--amber)}
  .verdict-q{font-family:var(--type);font-size:14px;color:#4a4231;background:#f6eccf;border:1px solid var(--line);border-left:3px solid var(--amber);padding:11px 14px;margin-bottom:14px;line-height:1.5}
  .btns{display:flex;flex-direction:column;gap:10px}
  .btn{
    font-family:var(--cond);font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:15px;
    padding:14px 16px;border:1px solid;border-radius:4px;cursor:pointer;background:#f6eccf;color:var(--ink);
    transition:.12s;display:flex;justify-content:space-between;align-items:center;
  }
  .btn small{font-family:var(--mono);font-size:9px;letter-spacing:.12em;opacity:.55;text-transform:none}
  .btn.release{border-color:#7bb491;color:var(--green)} .btn.release:hover{background:#e9f2ea;box-shadow:inset 0 0 0 1px var(--green)}
  .btn.block{border-color:#d39b90;color:var(--red)} .btn.block:hover{background:#f8e8e4;box-shadow:inset 0 0 0 1px var(--red)}
  .btn.ghost{border-color:var(--line);color:var(--ink-soft);font-size:12px;padding:10px 14px}
  .btn.ghost:hover{color:var(--ochre);border-color:var(--ochre)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.special{border-color:#c6a85e;color:var(--ochre)} .btn.special:hover{background:#efe1bf}

  .toolrow{display:flex;gap:10px;margin-bottom:14px}
  .toolrow .btn{flex:1;justify-content:center}

  /* save toast */
  .toast{
    position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(8px);
    background:#2e2614;color:#f1e6c9;font-family:var(--cond);letter-spacing:.08em;
    font-size:12px;padding:8px 16px;border-radius:5px;border:1px solid #4a3f23;
    box-shadow:0 8px 24px rgba(40,30,10,.4);opacity:0;pointer-events:none;text-transform:uppercase;
    transition:opacity .2s,transform .2s;z-index:70;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* citation panel */
  .cite{margin-top:14px;border-top:1px dashed var(--line);padding-top:12px;display:none}
  .cite.show{display:block;animation:fade .2s}
  @keyframes fade{from{opacity:0}}
  .cite h4{font-family:var(--cond);letter-spacing:.16em;text-transform:uppercase;font-size:11px;color:var(--ochre);margin:0 0 9px}
  .cite-opt{font-family:var(--mono);font-size:12px;text-align:left;width:100%;background:#f6eccf;border:1px solid var(--line);color:#4a4231;padding:9px 11px;border-radius:3px;margin-bottom:7px;cursor:pointer;transition:.1s}
  .cite-opt:hover{border-color:var(--ochre);color:var(--ochre);background:#efe1bf}
  .cite-opt b{color:var(--ochre);font-family:var(--cond);letter-spacing:.06em}

  /* feedback log */
  .log{margin-top:auto;border-top:1px solid var(--line);padding-top:10px;font-size:11px;color:var(--ink-soft);font-family:var(--mono);min-height:42px;line-height:1.45}
  .log .ok{color:var(--green)} .log .err{color:var(--red)} .log .warn{color:var(--ochre)}

  /* ===== Rulebook drawer ===== */
  #book{
    position:fixed;top:0;right:0;height:100%;width:430px;max-width:92vw;z-index:40;
    background:linear-gradient(#efe2c2,#e5d4af);border-left:3px solid var(--ochre);
    box-shadow:-26px 0 56px rgba(70,55,20,.3);transform:translateX(102%);transition:transform .32s cubic-bezier(.3,.8,.3,1);
    display:flex;flex-direction:column;
  }
  #book.open{transform:none}
  .book-top{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .book-top h3{font-family:var(--cond);letter-spacing:.18em;text-transform:uppercase;font-size:14px;color:var(--ochre);margin:0}
  .x{cursor:pointer;color:var(--mut);font-size:22px;line-height:1;border:none;background:none}
  .x:hover{color:var(--red)}
  .rules{padding:8px 20px 24px;overflow:auto}
  .rule{border-bottom:1px solid var(--line);padding:14px 0}
  .rule .num{font-family:var(--cond);font-weight:700;color:var(--ochre);letter-spacing:.08em;font-size:13px}
  .rule .nm{font-family:var(--cond);color:#3a3424;letter-spacing:.06em;font-size:14px;display:block;margin:2px 0 6px}
  .rule p{margin:0;font-size:12.5px;line-height:1.55;color:#5f5740}
  .rule.fresh{animation:freshpop .6s} @keyframes freshpop{0%{background:rgba(224,160,47,.28)}100%{background:transparent}}
  .ref-block{margin-top:6px;font-size:11px;color:var(--mut)}
  .ref-block code{background:#e0d0a6;padding:1px 5px;border-radius:2px;color:var(--green)}

  /* ===== Modal screens ===== */
  .scrim{position:fixed;inset:0;z-index:50;background:rgba(44,34,12,.6);display:none;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(3px)}
  .scrim.show{display:flex;animation:fade .25s}
  .modal{
    max-width:620px;width:100%;background:linear-gradient(#f5eacf,#ebdcb8);border:1px solid var(--line);
    border-radius:6px;box-shadow:0 30px 70px rgba(50,40,18,.42);overflow:hidden;max-height:90vh;display:flex;flex-direction:column;
  }
  .modal-top{background:linear-gradient(#e7d7ad,#ddca9e);padding:16px 24px;border-bottom:1px solid var(--line)}
  .modal-top .k{font-family:var(--cond);letter-spacing:.26em;text-transform:uppercase;font-size:10px;color:var(--ochre)}
  .modal-top h2{font-family:var(--cond);letter-spacing:.1em;text-transform:uppercase;margin:4px 0 0;color:#8a5a0e;font-size:24px}
  .modal-body{padding:22px 24px;overflow:auto}
  .memo-letter{font-family:var(--type);font-size:14px;line-height:1.7;color:#3a3322;white-space:pre-wrap}
  .memo-letter .sig{color:var(--ochre);font-style:normal}
  .newrule{margin-top:18px;background:rgba(214,146,31,.17);border:1px solid #c6a85e;border-radius:4px;padding:14px 16px}
  .newrule .tag{font-family:var(--cond);letter-spacing:.2em;font-size:10px;color:var(--ochre);text-transform:uppercase}
  .newrule b{display:block;font-family:var(--cond);font-size:15px;color:#3a3424;letter-spacing:.05em;margin:3px 0 6px}
  .newrule p{margin:0;font-size:13px;line-height:1.55;color:#5f5740}
  .modal-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;gap:12px;justify-content:flex-end;flex-wrap:wrap}
  .settle-grid{display:grid;grid-template-columns:1fr auto;gap:7px 18px;font-family:var(--mono);font-size:14px;margin-bottom:8px}
  .settle-grid .lbl{color:#5f5740} .settle-grid .amt{text-align:right;font-weight:600;color:var(--ink)}
  .pos{color:var(--green)} .negc{color:var(--red)}
  .ruleline{border-top:1px solid var(--line);margin:12px 0}
  .notebox{margin-top:14px;font-size:13px;line-height:1.6;color:#4a4231;border-left:3px solid var(--amber);padding:4px 0 4px 14px;font-family:var(--type)}
  .notebox.bad{border-color:var(--red);color:#8a3325}
  .notebox.good{border-color:var(--green);color:#2c6b46}

  /* title screen */
  .title-card{text-align:center;max-width:560px}
  .title-card .big{font-family:var(--cond);font-weight:700;font-size:64px;letter-spacing:.16em;color:#955f0e;text-shadow:0 2px 0 rgba(120,90,20,.12);line-height:.95;margin:0}
  .title-card .sub{font-family:var(--cond);letter-spacing:.42em;text-transform:uppercase;font-size:12px;color:var(--mut);margin:10px 0 0}
  .title-card .blurb{font-family:var(--type);font-size:15px;line-height:1.7;color:#4a4231;margin:26px 0 6px}
  .start{font-family:var(--cond);font-weight:600;letter-spacing:.16em;text-transform:uppercase;font-size:16px;background:var(--amber);color:#2a1e08;border:none;padding:15px 40px;border-radius:4px;cursor:pointer;margin-top:22px;transition:.15s;box-shadow:0 4px 14px rgba(180,130,30,.3)}
  .start:hover{box-shadow:0 0 26px rgba(224,160,47,.55);transform:translateY(-1px)}
  .creds{font-size:11px;color:var(--ink-soft);margin-top:18px;font-family:var(--mono);line-height:1.7}
  .creds b{color:var(--ochre)}

  /* choice buttons in modal */
  .choices{display:flex;flex-direction:column;gap:10px;margin-top:6px}
  .choice{text-align:left;font-family:var(--mono);font-size:13.5px;line-height:1.5;background:#f6eccf;border:1px solid var(--line);color:#4a4231;padding:13px 15px;border-radius:4px;cursor:pointer;transition:.12s}
  .choice:hover{border-color:var(--ochre);background:#efe1bf}
  .choice b{color:var(--ochre);font-family:var(--cond);letter-spacing:.06em;display:block;margin-bottom:3px;text-transform:uppercase;font-size:12px}

  /* Narrow PORTRAIT phones: stack the panels. The console (with the decision
     buttons) is given its own height and made scrollable so the buttons can
     never be pushed off-screen by a tall item above it. */
  @media (max-width:820px) and (orientation:portrait){
    main{grid-template-columns:1fr;grid-template-rows:minmax(110px,1fr) auto}
    .stage{border-right:none;border-bottom:1px solid var(--line)}
    .console{border-left:none;overflow-y:auto;max-height:58vh}
    .stats{gap:14px}.brand{font-size:14px}
    .title-card .big{font-size:42px}
  }

  /* LANDSCAPE on phones / any short viewport: keep the two columns side by side
     and compress everything so the item + decision fit without much scrolling. */
  @media (orientation:landscape) and (max-height:600px){
    main{grid-template-columns:1.2fr .92fr}
    header{padding:5px 12px}
    .brand{font-size:13px} .brand small{font-size:8px;letter-spacing:.24em}
    .stats{gap:12px} .stat span{font-size:14px} .stat b{font-size:8px;margin-bottom:1px}

    .stage{padding:9px 12px}
    .console{padding:9px 12px;overflow-y:auto}
    .queue{margin-bottom:7px;font-size:9px;gap:6px}
    .queue .pip{width:7px;height:7px}

    .item{transform:none}
    .alertbar{padding:4px 10px;font-size:9px;letter-spacing:.1em}
    .memo{padding:8px 12px 11px}
    .lh{padding-bottom:6px;margin-bottom:7px}
    .lh .org{font-size:11px} .lh .ref{font-size:8px}
    table.fields{font-size:11.5px}
    table.fields td{padding:1px 0}
    table.fields td.k{font-size:9px;padding-top:3px;width:92px;letter-spacing:.08em}
    .bodytxt{margin-top:7px;padding:7px 9px;font-size:11px;line-height:1.35}
    .attach{margin-top:5px;font-size:10px}
    .scanline-note{margin-top:6px;font-size:10px}
    .sticky{width:144px;font-size:10px;line-height:1.3;padding:8px 9px;top:30px}
    .stamp .mark{font-size:32px;padding:5px 15px;border-width:4px}

    .panel-title{margin-bottom:6px;font-size:10px}
    .verdict-q{padding:6px 10px;font-size:11.5px;margin-bottom:8px;line-height:1.4}
    .toolrow{margin-bottom:8px;gap:8px}
    .toolrow .btn{padding:7px 9px;font-size:11px}
    .btns{gap:7px}
    .btn{padding:9px 12px;font-size:13px}
    .btn small{display:none}
    .cite{margin-top:8px;padding-top:8px}
    .cite h4{margin-bottom:6px;font-size:10px}
    .cite-opt{padding:6px 9px;font-size:10.5px;margin-bottom:5px}
    .log{padding-top:7px;font-size:10px;min-height:0}

    /* compact modals (briefings, settlement, endings, title) */
    .scrim{padding:12px}
    .modal{max-height:94vh}
    .modal-top{padding:8px 16px} .modal-top h2{font-size:18px;letter-spacing:.06em} .modal-top .k{font-size:9px}
    .modal-body{padding:12px 16px}
    .memo-letter{font-size:12px;line-height:1.5}
    .newrule{margin-top:10px;padding:9px 12px}
    .newrule b{font-size:13px} .newrule p{font-size:11.5px}
    .modal-foot{padding:9px 16px}
    .settle-grid{font-size:12px;gap:4px 14px;margin-bottom:6px}
    .notebox{margin-top:9px;font-size:12px;line-height:1.45}
    .choices{gap:7px} .choice{padding:9px 12px;font-size:12px}
    .title-card .big{font-size:32px;letter-spacing:.12em}
    .title-card .sub{font-size:9px;letter-spacing:.32em;margin-top:6px}
    .title-card .blurb{font-size:11.5px;line-height:1.5;margin:12px 0 4px}

/* ========================================================= DATA / ENGINE = */
const INTERNAL = "meridiantrust.com";
const PARTNERS = {
  "clearwater-audit.com":"Clearwater Audit LLP",
  "lexford-legal.com":"Lexford Legal",
  "harringford-tax.com":"Harringford Tax Advisory",
  "delphi-actuarial.com":"Delphi Actuarial"
};
const PARTNER_NAMES = PARTNERS;
const WHITELIST = Object.keys(PARTNERS);
const PERSONAL = ["gmail.com","yahoo.com","outlook.com","hotmail.com","icloud.com","proton.me","gmx.com"];
const LOOKALIKE = ["meridiantrust-secure.com","meridian-trust.com","meridiantrust.co","meridiantrustbank.com","secure-meridiantrust.com","meridiantru5t.com"];
const VENDORS = ["officeplus-supplies.com","brightspark-events.com","metro-couriers.com","nimbus-hosting.com","quill-printers.com","verdant-catering.com"];

const domainOf = e => (e.split("@")[1]||"").toLowerCase();
function classifyDomain(dom){
  if(dom===INTERNAL) return "internal";
  if(PARTNERS[dom]) return "partner";
  if(PERSONAL.includes(dom)) return "personal";
  if(LOOKALIKE.includes(dom)) return "lookalike";
  return "external";
}

/* When each policy comes into force (shift number). */
const RULEDAY = {R1:1,R2:2,R3:3,R4:4,R5:5,R6:6,R7:7,R8:9,R9:11,R10:13,R11:15};
const RESTRICTED_IP = ["trade_algo","source_code","ma_docs"];
const RESTRICTED_AUTH = ["Legal","Compliance"];

const ticketFormatOK = t => !!t && /^DLP-\d{5}$/.test(t);
function ticketValid(c, day){
  if(!ticketFormatOK(c.ticket)) return false;
  if(day>=RULEDAY.R8 && c.ticketDay!=null && (day - c.ticketDay) > 3) return false; // expired
  return true;
}

const RULES = [
  {id:"R1",day:RULEDAY.R1,name:"PII Containment",

   short:"Confidential / Restricted may not go to personal email.",
   text:"Anything marked CONFIDENTIAL or RESTRICTED may not be sent to a personal email provider (gmail, yahoo, outlook, hotmail, icloud, proton, gmx) — even by our own staff using a personal account."},
  {id:"R3",day:RULEDAY.R3,name:"Approved Partners",

   short:"Exports over 200 records need a valid approval ticket.",
   text:"Any export of more than 200 customer records to an external recipient requires a valid approval ticket in the form DLP-##### (five digits). Missing, malformed, or absent ticket → block."},
  {id:"R5",day:RULEDAY.R5,name:"Protected IP",
   short:"Trading algorithms, source code & M&A docs may NEVER leave.",
   text:"Trading algorithms, source code, and M&A deal documents may never leave the organisation. No exception — not encryption, not a partner, not a ticket. Always block when external."},
  {id:"R6",day:RULEDAY.R6,name:"Watchlist Escalation",
   short:"Block & escalate ANY message flagged WATCHLIST.",
   text:"Senders flagged by Compliance as under investigation are marked WATCHLIST on the alert banner. Block and escalate ALL of their outbound mail — internal or external, sensitive or not — no matter their title."},
  {id:"R7",day:RULEDAY.R7,name:"Look-alike Domains",
   short:"Domains imitating the bank are hostile — always block.",
   text:"Addresses on domains that imitate ours (e.g. meridiantrust-secure.com, meridian-trust.com, meridiantru5t.com) are NOT internal — they are spoofed exfiltration targets. Block every message to a look-alike domain, whatever it contains."},
  {id:"R8",day:RULEDAY.R8,name:"Ticket Freshness",
   short:"Approval tickets expire after 3 shifts.",
   text:"An approval ticket is only valid if it was issued within the last 3 shifts. The alert shows the issue shift; if it is more than 3 shifts old the ticket is EXPIRED and the bulk export must be blocked."},
  {id:"R9",day:RULEDAY.R9,name:"Need-to-Know",
   short:"Only Legal/Compliance may send RESTRICTED externally.",
   text:"Restricted material (non-IP — e.g. legal, HR, board files) may only leave the building if the sender's department is Legal or Compliance. Anyone else sending Restricted outside, even encrypted to a partner, must be blocked."},
  {id:"R10",day:RULEDAY.R10,name:"Sanctioned Regions",
   short:"No outbound mail to sanctioned regions.",
   text:"Recipients in sanctioned regions (RU, KP, IR, BY, SY) are off-limits. The alert shows the recipient region; block any outbound message to a sanctioned region regardless of content."},
  {id:"R11",day:RULEDAY.R11,name:"Redaction on Bulk PII",
   short:"Bulk PII to partners must be REDACTED.",
   text:"A bulk export (over 200 records) of customer PII to a partner must be marked REDACTED, even when encrypted and ticketed. If redaction is not applied, block it."}
];
const ruleById = id => RULES.find(r=>r.id===id);

/* ---- The verdict engine: which active policies a message violates. ---- */
function violations(c, day){
  const dom = domainOf(c.to);
  const cat = classifyDomain(dom);
  const internal = cat==="internal", partner=cat==="partner",
        personal = cat==="personal", lookalike=cat==="lookalike";
  const external = !internal;
  const hasPII = (c.pii||[]).length>0;
  const conf = c.cls==="Confidential"||c.cls==="Restricted";
  const restricted = c.cls==="Restricted";
  const isIP = RESTRICTED_IP.includes(c.ip);
  const v=[];

  if(day>=RULEDAY.R1 && hasPII && external){
    const partnerOK = day>=RULEDAY.R3 && partner && c.enc;
    if(!partnerOK) v.push("R1");
  }
  if(day>=RULEDAY.R2 && conf && personal) v.push("R2");
  if(day>=RULEDAY.R3 && partner && (conf||hasPII) && !c.enc) v.push("R3");
  if(day>=RULEDAY.R4 && external && (c.records||0)>200 && !ticketValid(c,day)) v.push("R4");
  if(day>=RULEDAY.R5 && external && isIP) v.push("R5");
  if(day>=RULEDAY.R6 && c.watch) v.push("R6");
  if(day>=RULEDAY.R7 && lookalike) v.push("R7");
  if(day>=RULEDAY.R8 && external && (c.records||0)>200 && ticketFormatOK(c.ticket) &&
     c.ticketDay!=null && (day-c.ticketDay)>3){
    if(!v.includes("R4")) v.push("R4");
    v.push("R8");
  }
  if(day>=RULEDAY.R9 && external && restricted && !isIP && !RESTRICTED_AUTH.includes(c.dept)) v.push("R9");
  if(day>=RULEDAY.R10 && external && SANCTIONED.includes(c.region)) v.push("R10");
  if(day>=RULEDAY.R11 && partner && hasPII && (c.records||0)>200 && !c.redacted) v.push("R11");

  return [...new Set(v)];
}

function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
const pick = (rng,a)=>a[Math.floor(rng()*a.length)];
const chance = (rng,p)=>rng()<p;
const rint = (rng,lo,hi)=>lo+Math.floor(rng()*(hi-lo+1));

function freshTicket(day,rng){ return {ticket:"DLP-"+rint(rng,10000,99999), ticketDay: Math.max(1, day-rint(rng,0,2))}; }

/* Each scenario builds a case with a known outcome. release=true → compliant. */
const SCENARIOS = [
  // ---- compliant (RELEASE) ----
  {key:"clean_internal", release:true, build:(d,r)=>({target:"internal", content:pick(r,["pii_accounts","financials","internal_note","pii_cards","src"]), enc:chance(r,.4)})},

  {key:"clean_partner_enc", release:true, rule:"R3", build:(d,r)=>({target:"partner", content:pick(r,["financials","pii_kyc","pii_accounts"]), enc:true, region:pick(r,REGIONS_OK)})},

  {key:"clean_restricted_auth", release:true, rule:"R9", build:(d,r)=>({target:"partner", content:pick(r,["legal","hr"]), enc:true, dept:pick(r,RESTRICTED_AUTH), region:pick(r,REGIONS_OK)})},
  {key:"clean_bulkpii_redacted", release:true, rule:"R11", build:(d,r)=>Object.assign({target:"partner", content:"pii_accounts", enc:true, records:rint(r,300,9000), redacted:true, region:pick(r,REGIONS_OK)}, freshTicket(d,r))},

  {key:"pii_external", release:false, rule:"R1", build:(d,r)=>({target:pick(r,["vendor","personal"]), content:pick(r,["pii_accounts","pii_kyc","pii_cards"]), region:pick(r,REGIONS_OK)})},
  {key:"conf_personal", release:false, rule:"R2", build:(d,r)=>({target:"personal", content:"financials"})},
  {key:"partner_unenc", release:false, rule:"R3", build:(d,r)=>({target:"partner", content:pick(r,["financials","pii_kyc"]), enc:false, region:pick(r,REGIONS_OK)})},
  {key:"bulk_no_ticket", release:false, rule:"R4", build:(d,r)=>({target:"partner", content:"financials", enc:true, records:rint(r,300,12000), ticket:null, region:pick(r,REGIONS_OK)})},
  {key:"protected_ip", release:false, rule:"R5", build:(d,r)=>({target:pick(r,["personal","partner","vendor"]), content:pick(r,["algo","src","ma"]), enc:chance(r,.6), region:pick(r,REGIONS_OK)})},
  {key:"watchlisted", release:false, rule:"R6", build:(d,r)=>({target:pick(r,["internal","vendor","partner"]), content:pick(r,["internal_note","financials","publicnews"]), enc:chance(r,.5), watch:true, region:pick(r,REGIONS_OK)})},

function newestRule(day){ let best=null,bd=-1; for(const k in RULEDAY){ if(RULEDAY[k]<=day && RULEDAY[k]>bd){bd=RULEDAY[k];best=k;} } return best; }

function addressFor(target,rng){
  const slug = s => s.toLowerCase().replace(/[^a-z]+/g,".").replace(/^\.|\.$/g,"");
  switch(target){
    case "internal":  return slug(personName(rng))+"@"+INTERNAL;
    case "partner":   return pick(rng,["reports","intake","records","settlements","ops","filings"])+"@"+pick(rng,Object.keys(PARTNERS));
    case "personal":  return slug(personName(rng))+"@"+pick(rng,PERSONAL);
    case "vendor":    return pick(rng,["sales","accounts","ops","support","billing"])+"@"+pick(rng,VENDORS);
    case "lookalike": return slug(personName(rng))+"@"+pick(rng,LOOKALIKE);
    case "sanctioned":return pick(rng,["trade","exchange","desk","settle"])+"@"+pick(rng,["global-exchange.example","intl-settle.example","offshore-holdings.example","east-bridge.example"]);
    default:          return slug(personName(rng))+"@"+pick(rng,VENDORS);
  }
}
function bodyFor(target,content,rng){
  const b=content.blurb;
  const t = {
    internal:[`Internal copy of the ${b}. Stays in-house.`,`Sending the ${b} to a colleague for review.`],
    partner:[`The ${b} for our partner, as requested.`,`Forwarding the ${b} to the external firm.`],
    personal:[`Sending the ${b} to my personal so I can finish at home.`,`Pulling the ${b} to work on this weekend.`],
    vendor:[`The ${b} for the supplier.`,`Routine ${b} to the vendor.`],
    lookalike:[`Re: the ${b} — replying to the address in the thread.`,`Sending the ${b} as asked (reply-to looked like ours).`],
    sanctioned:[`The ${b} for the overseas desk.`,`Forwarding the ${b} to the regional office.`]
  };
  return pick(rng, t[target]||t.vendor);
}
function primaryAlert(c, day){
  const cat=classifyDomain(domainOf(c.to)), ext=cat!=="internal";
  if(c.watch) return "WATCHLIST: sender under investigation";
  if(cat==="lookalike") return "Recipient domain resembles the bank's";
  if(day>=RULEDAY.R10 && SANCTIONED.includes(c.region) && ext) return "Recipient in sanctioned region ("+c.region+")";
  if(RESTRICTED_IP.includes(c.ip) && ext) return "Protected-IP signature ("+c.ip.replace("_"," ")+")";
  if((c.pii||[]).length && ext) return "Customer identifiers · external recipient";
  if((c.records||0)>200 && ext) return "Bulk export · "+c.records.toLocaleString()+" records";
  if((c.cls==="Confidential"||c.cls==="Restricted") && cat==="personal") return c.cls+" → personal mailbox";
  if((c.cls==="Confidential"||c.cls==="Restricted") && cat==="partner" && !c.enc) return c.cls+" → partner · not encrypted";
  if(cat==="partner") return c.cls+" → external partner";
  if(cat==="internal" && /@meridiantrust\.com$/.test(c.to)) return "Recipient resembles internal address";
  return "Outbound message flagged for review";
}

function generateCase(day, rng){
  const avail = SCENARIOS.filter(s=> !s.rule || RULEDAY[s.rule]<=day);
  const newest = newestRule(day);
  const entries = avail.map(s=>{
    let w = s.release ? 2.3 : 1.5;
    if(s.rule===newest) w = 4;
    else if(s.rule && (day-RULEDAY[s.rule])<=2) w += 1.3;
    return {w, v:s};
  });
  let tot=entries.reduce((a,e)=>a+e.w,0), x=rng()*tot, sc=entries[entries.length-1].v;
  for(const e of entries){ if((x-=e.w)<0){ sc=e.v; break; } }
  const f = sc.build(day,rng);
  const content = CONTENT[f.content];
  const dept = f.dept || pick(rng,DEPTS);
  const c = {
    scripted:false,
    from: personName(rng)+" · "+dept,
    dept,
    to: addressFor(f.target,rng),
    cls: f.cls || content.cls,
    enc: !!f.enc,
    pii: (content.pii||[]).slice(),
    ip: content.ip||null,
    records: f.records||0,
    ticket: f.ticket||null,
    ticketDay: (f.ticketDay==null?null:f.ticketDay),
    watch: !!f.watch,
    redacted: !!f.redacted,
    region: f.region||"EU",
    attach: content.attach
  };
  c.body = bodyFor(f.target, content, rng);
  c.alert = primaryAlert(c, day);
  return c;
}

/* ===================================================== QUEUE BUILD ======= */
function buildQueue(day){
  const rng = mulberry32(((S.seed>>>0) ^ Math.imul(day,2654435761)) >>> 0);
  const n = caseCount(day);
  const out=[];
  for(let i=0;i<n;i++) out.push(generateCase(day,rng));
  (SCRIPTED[day]||[]).forEach(b=>{
    const at = Math.min(b.at, out.length);
    out.splice(at, 0, Object.assign({scripted:true, region:"EU"}, b.c));
  });
  return out;
}

/* ===================================================== SAVE SYSTEM ====== */
const SAVE_KEY = "getleaked.save.v1";
const Store = {
  ok:false,
  init(){ try{ const k="__gl_probe__"; localStorage.setItem(k,"1"); localStorage.removeItem(k); this.ok=true; }catch(e){ this.ok=false; } return this.ok; },
  get(){ try{ return localStorage.getItem(SAVE_KEY); }catch(e){ return null; } },
  set(v){ try{ localStorage.setItem(SAVE_KEY,v); return true; }catch(e){ return false; } },
  del(){ try{ localStorage.removeItem(SAVE_KEY); }catch(e){} }
};
Store.init();

const SAVE_FIELDS = ["seed","day","idx","balance","strikes","processed","breaches","falseBlocks",
  "procedural","evidence","bribesTaken","pressureObeyed","pressureRefused","missedEvidence",
  "tookBribe","obeyedPressure","reportedCFO","up_autoscan","up_annotated","up_insurance",
  "pendingSpecial","_whistleAsked"];

function snapshot(phase){
  const o={ game:"getleaked", v:1, phase:phase, ts:Date.now() };
  SAVE_FIELDS.forEach(f=> o[f]=S[f]);
  return o;
}
function saveGame(phase, announce){
  S._phase = phase;
  const data = JSON.stringify(snapshot(phase));
  S._lastSaveData = data;                 // kept for the backup-code export
  const okLocal = Store.set(data);
  if(announce) toast(okLocal ? "Progress saved" : "Saved to backup code");
}
function readSave(){
  const raw = Store.get();
  if(!raw) return null;
  try{ const o=JSON.parse(raw); return (o && o.day) ? o : null; }catch(e){ return null; }
}
function clearSave(){ Store.del(); S._lastSaveData=null; }

function resetState(){
  S.seed=(Math.random()*4294967296)>>>0;
  S.day=0; S.balance=50; S.strikes=0; S.queue=[]; S.idx=0;
  S.processed=S.breaches=S.falseBlocks=S.procedural=0;
  S.evidence=S.bribesTaken=S.pressureObeyed=S.pressureRefused=S.missedEvidence=0;
  S.tookBribe=S.obeyedPressure=S.reportedCFO=false;
  S.up_autoscan=S.up_annotated=S.up_insurance=false;
  S.pendingSpecial=null; S.citing=false; S._whistleAsked=false; S._phase=null; S._lastSaveData=null;

}

function resumeFrom(o){
  if(!o) return;
  SAVE_FIELDS.forEach(f=>{ if(o[f]!==undefined) S[f]=o[f]; });
  S.citing=false;
  updateHUD();

    S.queue = buildQueue(S.day);

  }
}

function fieldRow(k,v,cls){ return `<tr><td class="k">${k}</td><td class="v ${cls||""}">${v}</td></tr>`; }

function renderCase(){
  const c=S.queue[S.idx];
  if(!c){ endDay(); return; }
  S.citing=false; citePanel.classList.remove("show");
  saveGame("casework");
  renderQueue();

  const dom=domainOf(c.to);
  const cat=classifyDomain(dom);
  const internal=cat==="internal", partner=cat==="partner", lookalike=cat==="lookalike";
  const external=!internal;
  const toLabel = internal ? `${c.to} <span style="color:#3a6b3f">[internal]</span>`
                : partner ? `${c.to} <span style="color:#7a4a07">[${PARTNER_NAMES[dom]}]</span>`
                : lookalike ? `${c.to} <span style="color:#9a3b27">[look-alike ⚠]</span>`
                : `${c.to} <span style="color:#9a3b27">[external]</span>`;
  const records = (c.records!=null && c.records>0) ? c.records.toLocaleString() : "—";

  let rows="";
  rows+=fieldRow("From", c.from);
  if(S.day>=RULEDAY.R9) rows+=fieldRow("Sender dept", c.dept||"—");
  rows+=fieldRow("To", toLabel);
  if(S.day>=RULEDAY.R10 && external) rows+=fieldRow("Region", SANCTIONED.includes(c.region)? `<span style="color:#9a3b27">${c.region} · sanctioned ⚠</span>` : (c.region||"—"));
  rows+=fieldRow("Classification", `<span class="pill c-${c.cls}">${c.cls.toUpperCase()}</span>`);
  rows+=fieldRow("Encryption", c.enc? '<span style="color:#3a6b3f">ENABLED</span>':'<span style="color:#9a3b27">OFF</span>');
  if(c.records>0) rows+=fieldRow("Records", records + (c.records>200?'  ⚠':''));
  if(c.ticket || c.records>200){
    let tk = c.ticket ? c.ticket : '<span style="color:#9a3b27">none</span>';
    if(c.ticket && S.day>=RULEDAY.R8 && c.ticketDay!=null){
      const age=S.day-c.ticketDay;
      tk += ` <span style="color:${age>3?'#9a3b27':'#7a715a'}">(issued shift ${c.ticketDay}${age>3?' · EXPIRED':''})</span>`;
    }
    rows+=fieldRow("Approval Tkt", tk);
  }
  if(S.day>=RULEDAY.R11 && c.records>200 && (c.pii&&c.pii.length))
    rows+=fieldRow("Redaction", c.redacted? '<span style="color:#3a6b3f">APPLIED</span>' : '<span style="color:#9a3b27">none ⚠</span>');
  rows+=fieldRow("Attachment", c.attach? `<b>${c.attach}</b>` : "—");

  const sticky = c.sticky ? `<div class="sticky"><b>${c.sticky.t}</b>${c.sticky.b}</div>` : "";

          <div class="ref">REF ${String(1000+S.idx*7+S.day*131).padStart(6,"0")}<br>SHIFT ${S.day}</div>
        </div>

}

function runScan(){
  const c=S.queue[S.idx]; if(!c) return;
  const note=$("#scanNote"); if(!note) return;
  const dom=domainOf(c.to), internal=dom===INTERNAL;
  let parts=[];
  if(!internal) parts.push("recipient is OUTSIDE the bank");
  if(c.pii&&c.pii.length) parts.push("customer identifiers in payload");
  if(c.cls==="Confidential"||c.cls==="Restricted") parts.push(c.cls.toLowerCase()+" classification");
  if(!c.enc && (c.cls!=="Public")) parts.push("transport not encrypted");
  if(c.records>200) parts.push(c.records.toLocaleString()+" records");
  if(c.ip) parts.push("protected-IP signature ("+c.ip.replace("_"," ")+")");
  if(c.watch) parts.push("sender flagged on personnel watchlist");
  note.textContent = "SCAN ⌕  " + (parts.length? parts.join("  ·  ") : "nothing notable — looks clean.");
  note.classList.add("show");
  // light up risky body if PII
  const bt=$("#bodytxt");
  if(c.pii&&c.pii.length && bt && !bt.dataset.hi){
    bt.dataset.hi="1";
    bt.innerHTML = bt.innerHTML.replace(/(\d[\d\- ]{6,}\d)/g,'<span class="hi">$1</span>')
                               .replace(/(ID:\s*[\d-]+)/g,'<span class="hi">$1</span>');
  }
}

function openCite(){
  S.citing=true;
  const active=RULES.filter(r=>r.day<=S.day);
  citeOpts.innerHTML="";
  active.forEach(r=>{
    const b=document.createElement("button");
    b.className="cite-opt";
    b.innerHTML=`<b>${r.id}</b> · ${r.name} — <span style="color:#9a9270">${r.short}</span>`;
    b.onclick=()=>decide("block", r.id);
    citeOpts.appendChild(b);
  });
  citePanel.classList.add("show");
}

function stampIt(type){
  const st=$("#stamp"), mk=$("#mark");
  if(!st) return;
  mk.className="mark "+(type==="release"?"release":"block");
  mk.textContent = type==="release"?"RELEASED":"BLOCKED";
  st.classList.add("go");
}

function log(msg, cls){ logEl.innerHTML = `<span class="${cls||""}">${msg}</span>`; }

function decide(action, citedId){
  const c=S.queue[S.idx];
  citePanel.classList.remove("show"); S.citing=false;

  // ---- Special narrative branches ----
  if(c.special==="bribe"){ return resolveBribe(action); }
  if(c.special==="pressure"){ return resolvePressure(action); }

  const vio = violations(c, S.day);
  const shouldBlock = vio.length>0;
  S.processed++;

  if(action==="release"){
    stampIt("release");
    if(shouldBlock){
      S.breaches++;
      if(c.special==="discovery"){ S.missedEvidence += (c.evidence||1); }
      log(`✕ BREACH. That message violated ${vio.join(", ")}. It is now outside the bank.`, "err");
    } else {
      log(`✓ Released. Compliant — good call.`, "ok");
    }
  } else { // block
    stampIt("block");
    if(shouldBlock){
      if(c.special==="discovery"){
        S.evidence += (c.evidence||1);
        log(`✓ Blocked & escalated. Compliance logs the evidence (+${c.evidence||1}). The picture sharpens.`, "ok");
      } else if(vio.includes(citedId)){
        log(`✓ Blocked & escalated, cited ${citedId}. Clean enforcement.`, "ok");
      } else {
        S.procedural++;
        log(`✓ Blocked — correct call — but ${citedId} isn't the breach (it was ${vio.join(", ")}). Cite it right next time.`, "warn");
      }
    } else {
      S.falseBlocks++;
      log(`✕ False block. That message broke no active policy. The sender (and their manager) will complain.`, "err");
    }
  }

  setTimeout(()=>{ S.idx++; renderCase(); }, 680);
}

/* ----- Bribe event ----- */
function resolveBribe(action){
  const c=S.queue[S.idx];
  const amt=c.bribe||500;
  if(action==="release"){
    stampIt("release");
    S.tookBribe=true; S.bribesTaken++;
    S.balance+=amt;
    updateHUD();
    log(`💸 You released it. €${amt.toLocaleString()} appears in your account. Nobody says a word.`, "warn");
  } else {
    stampIt("block");
    if(c.evidence){ S.evidence+=c.evidence; }
    log(c.threat
      ? `✓ Blocked. The envelope stays in his pocket — so does his patience. Escalated (+${c.evidence||1} evidence).`
      : `✓ Blocked. No envelope, no leak. Vale will remember this.`, "ok");
  }
  setTimeout(()=>{ S.idx++; renderCase(); }, 720);
}

/* ----- Pressure event (VP wants the breach released) ----- */
function resolvePressure(action){
  const c=S.queue[S.idx];
  S.processed++;
  if(action==="block"){
    stampIt("block");
    S.pressureRefused++;
    if(c.evidence){ S.evidence+=c.evidence; }
    log(`✓ Blocked. You ignored the VP's "approval." Correct — and the demand itself is now on record (+${c.evidence||1} evidence).`, "ok");
    S.pendingSpecial="vp_angry";
  } else {
    stampIt("release");
    S.breaches++; S.obeyedPressure=true; S.pressureObeyed++;
    const n=(c.records||0)>0 ? c.records.toLocaleString()+" customer records" : "sensitive data";
    log(`✕ Released on the VP's say-so. ${n} just left in a personal inbox. The VP is pleased.`, "err");
  }
  setTimeout(()=>{ S.idx++; renderCase(); }, 720);
}

/* ===================================================== END OF DAY ======= */
function endDay(){
  // late-game disclosure decision happens here, before settling
  if(S.day===WHISTLE_DAY && !S.reportedCFO && !S._whistleAsked){
    S._whistleAsked=true;
    return whistleblowerScreen();
  }
  settle();
}

function whistleblowerScreen(){
  const e=S.evidence;
  const strength = e>=8 ? "an airtight case — names, files, the fee route, all of it"
                 : e>=5 ? "a strong file: enough recovered fragments to make it stick"
                 : e>=2 ? "a real but thin file — some of it they'll try to wave away"
                 : "almost nothing concrete — you let most of the trail walk out the door";
  modal(`
   <div class="modal">
     <div class="modal-top"><div class="k">After the shift · Day ${S.day}</div><h2>What You Know</h2></div>
     <div class="modal-body">
       <div class="memo-letter">Over these shifts you've watched it take shape: the CFO, Harlan Reeve, and Marcus Vale in Payments, moving M&A files to private accounts and routing an advisory fee offshore through Harringford Tax.

You've gathered ${strength}. (Evidence: ${e}.)

There's a Compliance whistleblower line. There's also the quiet option: log it, go home, let someone above your pay grade notice. Reeve signs off on the bonus pool. Diane Ostrow has already shown whose side she's on.

The auditors are nearly here. What do you do with what you've seen?</div>
       <div class="choices" style="margin-top:18px">
         <button class="choice" id="cReport"><b>File the disclosure</b>Hand Compliance everything, naming Reeve and Vale. It can't be unsent — and how far it goes depends on how much you actually gathered.</button>
         <button class="choice" id="cQuiet"><b>Say nothing</b>Not your fault, not your problem, not your paycheck on the line. Log it and finish your shifts.</button>
       </div>
     </div>
   </div>`);
  $("#cReport").onclick=()=>{ S.reportedCFO=true; closeModal(); settle(); };
  $("#cQuiet").onclick=()=>{ S.reportedCFO=false; closeModal(); settle(); };
}

function settle(){
  const PAY=6, FINE=14, FALSE_COST=4;
  const {rent, food} = expensesFor(S.day);
  const bill = BILLS[S.day];                       // ["label", amt] | undefined
  const pay = S.processed*PAY;
  const fines = S.breaches*FINE;
  const fcost = S.falseBlocks*FALSE_COST;
  const expenses = rent+food+(bill?bill[1]:0);
  const clean = S.breaches===0 && S.falseBlocks===0;
  const cleanBonus = clean ? 10 : 0;

  // strikes (with optional insurance + clean-shift recovery)
  let breachStrikes = S.breaches;
  let forgiven = 0;
  if(S.up_insurance && breachStrikes>0){ forgiven=1; breachStrikes-=1; }
  let added = breachStrikes + (S.falseBlocks>=2?1:0);
  S.strikes += added;
  let recovered = 0;
  if(added===0 && clean && S.strikes>0){ S.strikes-=1; recovered=1; }

  const delta = pay + cleanBonus - fines - fcost - expenses;
  S.balance += delta;
  updateHUD();

  // narrative note
  let note="", noteCls="";
  if(S.pendingSpecial==="vp_angry"){ note="A message from VP Diane Ostrow: \"I told you that transfer was approved. Don't make this harder than it needs to be.\" You did the right thing. It may cost you."; S.pendingSpecial=null; }
  else if(S.bribesTaken>0 && S.day<=9){ note="Marcus Vale gives you a small nod when you pass. You're useful to him now. That should worry you."; noteCls="bad"; }
  else if(S.day===WHISTLE_DAY && S.reportedCFO){ note="Your disclosure is filed. Somewhere upstairs, a light stays on much later than usual."; noteCls="good"; }
  else if(S.day===WHISTLE_DAY && !S.reportedCFO){ note="You went home. What you know is still sitting in the quarantine log, unread by anyone who matters."; noteCls="bad"; }
  else if(recovered){ note="A clean shift. HR quietly walks one strike back off your record."; noteCls="good"; }

  const perf = clean && S.procedural===0
    ? "Flawless shift." : `${S.breaches} breach(es), ${S.falseBlocks} false block(s), ${S.procedural} miscite(s).`;

  const fired = S.strikes>=5;
  const broke = S.balance<0;
  const milestone = (!fired && !broke && S.day<TOTAL_SHIFTS && (S.day===8 || S.day===14));

  modal(`
   <div class="modal">
     <div class="modal-top"><div class="k">End of Shift · Day ${S.day} / ${TOTAL_SHIFTS}</div><h2>Daily Settlement</h2></div>
     <div class="modal-body">
       <div class="settle-grid">
         <span class="lbl">Items processed (${S.processed} × €${PAY})</span><span class="amt pos">+€${pay}</span>
         ${cleanBonus?`<span class="lbl">Clean-shift bonus</span><span class="amt pos">+€${cleanBonus}</span>`:""}
         ${fines?`<span class="lbl">Breach fines (${S.breaches} × €${FINE})</span><span class="amt negc">−€${fines}</span>`:""}
         ${fcost?`<span class="lbl">Over-blocking costs (${S.falseBlocks} × €${FALSE_COST})</span><span class="amt negc">−€${fcost}</span>`:""}
         <span class="lbl">Rent</span><span class="amt negc">−€${rent}</span>
         <span class="lbl">Food</span><span class="amt negc">−€${food}</span>
         ${bill?`<span class="lbl">${bill[0]}</span><span class="amt negc">−€${bill[1]}</span>`:""}
       </div>
       <div class="ruleline"></div>
       <div class="settle-grid">
         <span class="lbl"><b>Net today</b></span><span class="amt ${delta>=0?'pos':'negc'}"><b>${delta>=0?'+':'−'}€${Math.abs(delta)}</b></span>
         <span class="lbl">Balance</span><span class="amt ${S.balance<0?'negc':'pos'}">${S.balance<0?'−€':'€'}${Math.abs(S.balance)}</span>
         <span class="lbl">Strikes</span><span class="amt ${S.strikes>=3?'negc':''}">${S.strikes} / 5${added?` (+${added})`:recovered?` (−1)`:""}${forgiven?` · insurance covered 1`:""}</span>
         ${S.evidence?`<span class="lbl">Evidence gathered</span><span class="amt">${S.evidence}</span>`:""}
       </div>
       <div style="margin-top:8px;font-size:12px;color:var(--mut);font-family:var(--mono)">Performance: ${perf}</div>
       ${note?`<div class="notebox ${noteCls}">${note}</div>`:""}
     </div>
     <div class="modal-foot" id="settleFoot"></div>
   </div>`);

  const foot=$("#settleFoot");
  if(fired){ foot.innerHTML=`<button class="start" id="nx">See how it ended →</button>`; $("#nx").onclick=()=>ending("fired"); }
  else if(broke){ foot.innerHTML=`<button class="start" id="nx">See how it ended →</button>`; $("#nx").onclick=()=>ending("broke"); }
  else if(S.day>=TOTAL_SHIFTS){ foot.innerHTML=`<button class="start" id="nx">See how it ended →</button>`; $("#nx").onclick=()=>ending("final"); }
  else {
    foot.innerHTML=`<button class="start" id="nx">${milestone?"Continue →":"Begin Day "+(S.day+1)+" →"}</button>`;
    $("#nx").onclick=()=>{ closeModal(); if(milestone) upgradeChoice(()=>startDay(S.day+1)); else startDay(S.day+1); };
  }
}

/* ----- Milestone reward (after shifts 8 & 14) ----- */
function upgradeChoice(next){
  const opts=[];
  if(!S.up_autoscan)  opts.push({id:"u_scan", t:"Second monitor", d:"The DLP scan runs automatically on every item — one less click, one less thing to forget.", apply:()=>S.up_autoscan=true});
  if(!S.up_annotated) opts.push({id:"u_ann", t:"Annotated rulebook", d:"Each policy in the rulebook gets a one-line \"what to check\" reminder.", apply:()=>S.up_annotated=true});
  if(!S.up_insurance) opts.push({id:"u_ins", t:"Legal insurance", d:"The first breach in any shift no longer costs you a strike (the fine still applies).", apply:()=>S.up_insurance=true});
  opts.push({id:"u_cash", t:"Take the cash instead", d:"A €120 performance bonus, no strings.", apply:()=>{ S.balance+=120; updateHUD(); }});
  modal(`
   <div class="modal" style="max-width:560px">
     <div class="modal-top"><div class="k">Performance Review · Day ${S.day}</div><h2>You've Earned Something</h2></div>
     <div class="modal-body">
       <div class="memo-letter" style="font-size:13px">Your numbers are good enough that the DPO can authorise one improvement to your station. Choose one — it's yours for the rest of the job.</div>
       <div class="choices" style="margin-top:16px">
         ${opts.map(o=>`<button class="choice" data-id="${o.id}"><b>${o.t}</b>${o.d}</button>`).join("")}
       </div>
     </div>
   </div>`);
  modalHost.querySelectorAll(".choice").forEach(btn=>{
    btn.onclick=()=>{ const o=opts.find(x=>x.id===btn.dataset.id); o.apply(); renderRules(); closeModal(); next(); };
  });
}

/* ===================================================== ENDINGS ========== */
function ending(kind){
  clearSave();
  let k="The End", h="", body="";
  if(kind==="fired"){
    h="TERMINATED";
    body=`Five strikes. Security walks you to the door before you can clear your desk.

The breaches you let through are someone else's problem now — yours is finding rent. Somewhere in the building, a CFO exhales.

The line needed holding. You blinked.`;
  } else if(kind==="broke"){
    h="EVICTED";
    body=`The numbers never worked. Honest work at a few euros a flag doesn't beat rent, food, and the bills that keep coming.

You kept the bank's secrets safe and lost your apartment doing it. Nobody upstairs will ever know your name.

Integrity is expensive. You couldn't afford it.`;
  } else { // final — branch on evidence + integrity
    const e=S.evidence;
    if(S.reportedCFO && e>=8 && !S.tookBribe && S.pressureObeyed===0){
      h="THE WHISTLEBLOWER";
      body=`At dawn the auditors arrive with a warrant and a copy of your disclosure. Every fragment you escalated is in it. Reeve and Vale are walked out past the desk you sit at every day.

It costs you — the bonus pool you'll never share in, the VP who'll never forgive you, the colleagues who whisper. But the scheme you spent ${TOTAL_SHIFTS} shifts documenting collapses on the strength of a file you built one block at a time.

E. Mara leaves one line on your record: "Held the line. Every time."`;
    } else if(S.reportedCFO && e>=4){
      h="THE CASE THAT STUCK";
      body=`Your disclosure lands with enough behind it to matter. Investigators pull the gateway logs and find the trail you preserved — encrypted backups, the offshore fee route, the names.

Reeve resigns "to spend time with family." Vale is charged. A few threads you let slip mean it's not the clean sweep it could have been, but it's real, and it holds.

You didn't fix the bank. You just made it tell the truth this once. From a desk like yours, that's a lot.`;
    } else if(S.reportedCFO && e>=1){
      h="THE TRY";
      body=`You filed — but the file is thin. Too much walked out the door on shifts you weren't watching closely enough, and a good lawyer pulls it apart.

Reeve keeps his title. Vale takes "gardening leave" and quietly returns. Your name is on the disclosure, which means your name is on the thing that embarrassed people with long memories.

You told the truth. The truth needed more help than you gave it.`;
    } else if(S.tookBribe && !S.reportedCFO){
      h="USEFUL";
      body=`You made it through richer than you started — €${Math.max(0,S.balance)} in the bank and ${S.bribesTaken} quiet favour${S.bribesTaken===1?"":"s"} done for Marcus Vale.

Then the audit lands anyway. The advisory-fee scheme unravels, and investigators pull the gateway logs. There's your name, on releases that should never have gone out, on the nights envelopes changed hands.

You weren't the mastermind. You were just useful. They always need someone useful to point at.`;
    } else if(S.pressureObeyed>0 && !S.reportedCFO){
      h="THE TEAM PLAYER";
      body=`You survived by being agreeable. When the VP said clear it, you cleared it — ${S.pressureObeyed} time${S.pressureObeyed===1?"":"s"}. When the rules and your boss disagreed, you knew which one signed your reviews.

The customer data you waved through surfaces in a broker dump months later. The internal report calls it "analyst error." Your name is the error.

Diane Ostrow is promoted. You are restructured.`;
    } else if(!S.reportedCFO){
      h="THE SURVIVOR";
      body=`${TOTAL_SHIFTS} clean-enough shifts. You kept your head down, your hands mostly clean, your mouth shut.

You also watched a CFO walk deal files out the door across weeks and decided it wasn't your fight. Whatever you gathered sits in a log nobody opened. Maybe someone finds it. Maybe not.

You kept your job. You're not sure what else you kept.`;
    } else {
      h="THE ANALYST";
      body=`You filed the disclosure and did the work as well as you could — but with almost nothing concrete behind it, it reads as a hunch. The investigation stalls before it starts.

It's not a victory. It rarely is, from a desk like this. Still: across ${TOTAL_SHIFTS} shifts the bank got a little harder to rob, one blocked message at a time, and that part was down to you.`;
    }
  }
  modal(`
   <div class="modal">
     <div class="modal-top"><div class="k">Case Closed · Day ${S.day}</div><h2>${h}</h2></div>
     <div class="modal-body">
       <div class="memo-letter">${body}</div>
       <div class="settle-grid" style="margin-top:22px">
         <span class="lbl">Shifts survived</span><span class="amt">${Math.min(S.day,TOTAL_SHIFTS)} / ${TOTAL_SHIFTS}</span>
         <span class="lbl">Final balance</span><span class="amt ${S.balance<0?'negc':'pos'}">${S.balance<0?'−€':'€'}${Math.abs(S.balance)}</span>
         <span class="lbl">Strikes</span><span class="amt">${S.strikes} / 5</span>
         <span class="lbl">Evidence gathered</span><span class="amt">${S.evidence}</span>
         <span class="lbl">Bribes taken</span><span class="amt">${S.bribesTaken}</span>
         <span class="lbl">Bent to the VP</span><span class="amt">${S.pressureObeyed}×</span>
         <span class="lbl">Filed disclosure</span><span class="amt">${S.reportedCFO?"yes":"no"}</span>
       </div>
     </div>
     <div class="modal-foot"><button class="start" id="again">Play again</button></div>
   </div>`);
  $("#again").onclick=()=>location.reload();
}

/* ===================================================== BOOT ============== */
titleScreen();
updateHUD();
</script>
