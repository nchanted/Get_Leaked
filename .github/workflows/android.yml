name: Build APK

on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses & install SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'
          cache-disabled: true

      - name: Locate Gradle project and build
        run: |
          SETTINGS=$(find . -name settings.gradle -not -path '*/build/*' | head -n1)
          if [ -z "$SETTINGS" ]; then
            echo "::error::No settings.gradle found anywhere in the repo. Push the project files so settings.gradle is at (or under) the repo root."
            exit 1
          fi
          PROJECT_DIR=$(dirname "$SETTINGS")
          echo "Gradle project located at: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          gradle assembleDebug --stacktrace --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: get-leaked-debug-apk
          path: '**/app/build/outputs/apk/debug/app-debug.apk'
          if-no-files-found: error
